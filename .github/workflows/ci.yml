name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run pack:check
      - name: Smoke npx CLI entrypoint
        run: |
          set -euo pipefail
          npx --yes . --help | grep -F 'Usage: sproutpad-conformance'
          out="$(mktemp)"
          npx --yes . --base-url https://api.sproutpad.ai --json >"$out"
          jq -e '.summary.outcome == "pass"' "$out" >/dev/null
